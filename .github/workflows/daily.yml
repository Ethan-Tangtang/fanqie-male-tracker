name: Daily Fanqie Male Tracker
on:
  schedule: [{cron: '0 0 * * *'}]
  workflow_dispatch:
permissions: {contents: write, pages: write, id-token: write}
concurrency: {group: fanqie-male-tracker, cancel-in-progress: false}
jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: '${{ steps.deployment.outputs.page_url }}'}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt && playwright install --with-deps chromium
      - run: python scrape_fanqie_male.py && python build_site.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with: {commit_message: 'chore: update Fanqie male rankings', file_pattern: 'data index.html'}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with: {path: '.'}
      - id: deployment
        uses: actions/deploy-pages@v4
